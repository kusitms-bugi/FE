name: Deploy Web App

on:
  push:
    branches: ['main']

# 병렬 실행 방지
concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # 품질 체크 Job
  # ============================================
  quality-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Verify pnpm-lock.yaml exists
        run: |
          if [ ! -f pnpm-lock.yaml ]; then
            echo "❌ pnpm-lock.yaml not found!"
            exit 1
          fi
          echo "✅ pnpm-lock.yaml found"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile --ignore-scripts || {
            echo "⚠️ Lockfile outdated, updating..."
            pnpm install --ignore-scripts
          }

      - name: Run ESLint
        run: pnpm lint:check
        continue-on-error: true

      - name: Run TypeScript check
        run: pnpm typecheck:renderer
        continue-on-error: true

  # ============================================
  # 빌드 및 배포 Job
  # ============================================
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: quality-check
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Verify pnpm-lock.yaml exists
        run: |
          if [ ! -f pnpm-lock.yaml ]; then
            echo "❌ pnpm-lock.yaml not found!"
            echo "📁 Current directory contents:"
            ls -la
            exit 1
          fi
          echo "✅ pnpm-lock.yaml found"
          echo "📦 pnpm version:"
          pnpm --version

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile --ignore-scripts || {
            echo "⚠️ Lockfile outdated, updating..."
            pnpm install --ignore-scripts
          }

      - name: Verify project setup
        run: |
          echo "✅ Dependencies installed successfully"
          echo "📁 Project structure:"
          ls -la
          echo "📦 Checking if renderer source exists:"
          if [ -d "src/renderer" ]; then
            echo "✅ src/renderer directory found"
          else
            echo "❌ src/renderer directory not found"
            exit 1
          fi

      - name: Build web app (renderer)
        env:
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}
        run: |
          pnpm run build:renderer
          echo "✅ Build completed"

      - name: Verify build output
        run: |
          echo "📁 Checking build output location:"
          if [ -d "dist/renderer" ]; then
            echo "✅ Found dist/renderer/"
            ls -la dist/renderer/ | head -10
          elif [ -d "src/renderer/dist" ]; then
            echo "✅ Found src/renderer/dist/"
            ls -la src/renderer/dist/ | head -10
          else
            echo "❌ Build output not found in expected locations"
            exit 1
          fi

          # index.html 확인
          if find . -name "index.html" -type f | grep -q dist; then
            echo "✅ index.html found in build output"
          else
            echo "❌ index.html not found in build output"
            exit 1
          fi

      - name: Create output directory
        run: |
          mkdir -p output

          # 빌드 출력 복사
          if [ -d "dist/renderer" ]; then
            echo "📁 Copying from dist/renderer/"
            cp -r dist/renderer/* output/
          elif [ -d "src/renderer/dist" ]; then
            echo "📁 Copying from src/renderer/dist/"
            cp -r src/renderer/dist/* output/
          else
            echo "❌ Build output not found"
            exit 1
          fi

          # Vercel 설정 파일 생성
          cat > output/vercel.json << 'EOF'
          {
            "buildCommand": "",
            "outputDirectory": ".",
            "devCommand": "",
            "installCommand": "",
            "framework": null,
            "regions": ["icn1"],
            "headers": [
              {
                "source": "/(.*)",
                "headers": [
                  { "key": "X-Content-Type-Options", "value": "nosniff" },
                  { "key": "X-Frame-Options", "value": "DENY" },
                  { "key": "X-XSS-Protection", "value": "1; mode=block" },
                  { "key": "Referrer-Policy", "value": "strict-origin-when-cross-origin" }
                ]
              },
              {
                "source": "/assets/(.*)",
                "headers": [
                  { "key": "Cache-Control", "value": "public, max-age=31536000, immutable" }
                ]
              }
            ],
            "redirects": [
              {
                "source": "/index.html",
                "destination": "/",
                "permanent": true
              }
            ],
            "rewrites": [
              { "source": "/(.*)", "destination": "/index.html" }
            ]
          }
          EOF

          # 빌드 정보 추가
          cat > output/build-info.json << EOF
          {
            "buildTime": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "$(git rev-parse HEAD)",
            "commitShort": "$(git rev-parse --short HEAD)",
            "branch": "$(git rev-parse --abbrev-ref HEAD)",
            "version": "$(node -p "require('./package.json').version")",
            "workflow": "${{ github.workflow }}",
            "runId": "${{ github.run_id }}"
          }
          EOF

      - name: Deploy to repository
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.AUTO_ACTIONS }}
        with:
          source-directory: 'output'
          destination-github-username: choihooo
          destination-repository-name: gubugionandon-FE
          user-email: ${{ secrets.EMAIL }}
          commit-message: '🚀 Deploy web app: ${{ github.event.commits[0].message }}'
          target-branch: main

      # 배포 실패 시 알림
      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "🔗 Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # 여기에 Slack/Discord 웹훅 추가 가능

      - name: Deploy info
        if: success()
        run: |
          echo "✅ Web app deployed successfully!"
          echo "📁 Source directory: output"
          echo "🎯 Target repository: choihooo/gubugionandon-FE"
          echo "📝 Commit: $(git rev-parse --short HEAD)"
          echo ""
          echo "🚨 IMPORTANT: Vercel 설정 확인 필요!"
          echo "   - Root Directory를 비워두거나 '.'로 설정하세요"
          echo "   - Build Command, Output Directory를 비워두세요"
